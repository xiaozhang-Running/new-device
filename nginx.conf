# Nginx配置文件

upstream backend {
    server localhost:5000;
}

server {
    listen 80;
    server_name device-warehouse.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name device-warehouse.example.com;
    
    ssl_certificate /etc/letsencrypt/live/device-warehouse.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/device-warehouse.example.com/privkey.pem;
    
    # 前端静态文件
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # 后端API
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 文件上传目录
    location /uploads {
        alias /var/www/uploads;
        autoindex off;
    }
}
